name: Deploy Web App & Notify Mobile

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy-web:
    name: Build & Deploy Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app (skip lint errors)
        run: npm run build
        continue-on-error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 5

      - name: Trigger Mobile App Update
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              console.log('📱 Triggering mobile app sync...');
              
              await github.rest.repos.createDispatchEvent({
                owner: 'Cadina247',
                repo: 'fuel-forward-drive',
                event_type: 'web-app-updated',
                client_payload: {
                  web_version: context.sha,
                  web_branch: context.ref,
                  triggered_at: new Date().toISOString(),
                  triggering_commit: context.payload.head_commit?.message || 'Web app update',
                  workflow_run_id: context.runId
                }
              });
              
              console.log('✅ Mobile sync triggered!');
              console.log(`Event Type: web-app-updated`);
              console.log(`Commit: ${context.sha.substring(0, 7)}`);
            } catch (error) {
              console.error('❌ Failed to trigger mobile update:', error.message);
            }

  notify-success:
    name: Success Summary
    runs-on: ubuntu-latest
    needs: build-and-deploy-web
    if: success()
    
    steps:
      - run: |
          echo "✅ Web app build successful!"
          echo "📱 Mobile app sync has been triggered"
          echo "🔄 Mobile app will check for updates and sync with web data"
